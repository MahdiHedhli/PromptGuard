# PromptGuard local stack: LiteLLM + Presidio analyzer + OPF service.
#
# Up:    docker compose up -d
# Logs:  docker compose logs -f
# Down:  docker compose down
#
# The OPF service downloads its model on first /detect (~3GB). Health is
# reported by the FastAPI server immediately; readiness (model loaded) is
# at /ready on port 8081.

services:
  litellm:
    build:
      context: .
      dockerfile: docker/litellm/Dockerfile
      args:
        LITELLM_TAG: main-stable
    image: promptguard-litellm:dev
    container_name: promptguard-litellm
    ports:
      - "${PROMPTGUARD_LITELLM_PORT:-4000}:4000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-promptguard-dev}
      PROMPTGUARD_POLICY_FILE: ${PROMPTGUARD_POLICY_FILE:-/app/policies/default.yaml}
      PROMPTGUARD_OPF_URL: http://opf-service:8081
      PROMPTGUARD_PRESIDIO_URL: http://presidio-analyzer:3000
    volumes:
      - ${PROMPTGUARD_LITELLM_CONFIG:-./docker/litellm/config.yaml}:/app/config.yaml:ro
      - ./policies:/app/policies:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=3)"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - promptguard
    depends_on:
      presidio-analyzer:
        condition: service_healthy
      opf-service:
        condition: service_healthy

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: promptguard-presidio-analyzer
    ports:
      - "${PROMPTGUARD_PRESIDIO_PORT:-5002}:3000"
    environment:
      PORT: "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5
    networks:
      - promptguard

  opf-service:
    build:
      context: ./src/promptguard/services/opf_service
      dockerfile: Dockerfile
    container_name: promptguard-opf
    ports:
      - "${PROMPTGUARD_OPF_PORT:-8081}:8081"
    environment:
      OPF_MODEL_ID: ${OPF_MODEL_ID:-openai/privacy-filter}
      OPF_DEVICE: ${OPF_DEVICE:-cpu}
    volumes:
      - opf-model-cache:/cache/huggingface
    healthcheck:
      # Use /ready (model loaded) so `docker compose up -d --wait` blocks
      # until the OPF model is actually usable. /health alone is server-up
      # only, which would let LiteLLM start before OPF could serve detect
      # requests, triggering the DEC-009 hard-fail. Long start_period
      # accommodates first-run model download (~3 GB, ~3 min on typical
      # connections); subsequent boots are seconds via the cached volume.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/ready || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 300s
      retries: 60
    networks:
      - promptguard

  # Optional mock Anthropic upstream for integration testing. Brought up
  # only when the `mock` profile is selected:
  #     docker compose --profile mock up -d --wait
  # It is not part of the default stack so a normal `docker compose up`
  # still routes to the real Anthropic / OpenAI APIs.
  mock-anthropic:
    profiles: [mock]
    build:
      context: ./docker/mock_anthropic
      dockerfile: Dockerfile
    image: promptguard-mock-anthropic:dev
    container_name: promptguard-mock-anthropic
    ports:
      - "${PROMPTGUARD_MOCK_ANTHROPIC_PORT:-9099}:9099"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9099/health || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - promptguard

volumes:
  opf-model-cache:

networks:
  promptguard:
    driver: bridge
