# LiteLLM proxy config for PromptGuard.
# v1 ships Anthropic + OpenAI-compatible upstreams. Keys are read from
# environment variables; no secrets in this file. The PromptGuard pre-call
# hook is wired via litellm_settings.callbacks below.

model_list:
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
  # claude CLI v2.x uses haiku-4-5 for side traffic (background
  # summarization etc) even when the user asked for sonnet. Without
  # this entry the side calls fail and the CLI surfaces a confusing
  # "Content block is not a text block" error.
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  set_verbose: false
  drop_params: true
  telemetry: false
  callbacks: handler.proxy_handler_instance

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # DEC-015: PromptGuard does not use LiteLLM's spend tracking, virtual keys,
  # or audit DB. The /v1/messages?beta=true route taken by recent claude
  # CLI versions otherwise hard-fails at the auth layer with
  # "No connected db". Allow proxy operation without a backing DB.
  allow_requests_on_db_unavailable: true
