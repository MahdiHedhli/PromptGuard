# Regex-only policy.
# Use case: environments where the OPF model is not available (offline
# install, restricted egress, etc.). Documented escape hatch from the
# DetectorUnavailableError message: "To run without OPF detection, set
# detectors.opf.enabled = false in your policy file."
#
# Coverage of structured secrets and RFC-1918 internal IPs is unchanged
# from default. Coverage of context-aware PII (free-form names, addresses,
# phones) is reduced because the OPF and Presidio stages are off.
name: regex-only
version: "1"
audit_only: false

detectors:
  regex:
    enabled: true
  opf:
    enabled: false
  presidio:
    enabled: false
  llm_judge:
    enabled: false

rules:
  - category: private_key
    action: BLOCK
  - category: cloud_api_key
    action: BLOCK
  - category: database_url
    action: BLOCK
  - category: jwt
    action: BLOCK
  - category: secret
    action: BLOCK
  - category: account_number
    action: TOKENIZE
  - category: email
    action: MASK
  - category: domain
    action: TOKENIZE
  - category: internal_ip
    action: TOKENIZE
  - category: customer_name
    action: TOKENIZE
  - category: private_name
    action: MASK
  - category: private_phone
    action: MASK
  - category: private_address
    action: MASK
